<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProxyFlow Containers</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <section class="popup">
    <header>
      <img src="../icons/icon.svg" alt="">
      <div>
        <strong data-i18n="popupTitle">ProxyFlow</strong>
        <span data-i18n="popupSub">Containers</span>
      </div>
    </header>

    <div id="statusBadge" class="status-badge" aria-live="polite">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText" data-i18n="statusLoading">Carregando...</span>
    </div>

    <button id="openOptions" type="button" data-i18n="openSettings">⚙️ Abrir configurações</button>
    <p data-i18n="popupDesc">Proxy por container, abas normais, janela privada e sites específicos.</p>
  </section>
  <script src="popup.js"></script>
</body>
</html>
